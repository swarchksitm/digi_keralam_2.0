server {
    listen 80;
    server_name digikeralam.ksitm.kerala.gov.in; # Replace with actual domain

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name digikeralam.ksitm.kerala.gov.in; # Replace with actual domain

    # SSL Configuration (Placeholders - Managed by Certbot)
    # ssl_certificate /etc/letsencrypt/live/digikeralam/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/digikeralam/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/digikeralam/html;
    index index.html;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' http://localhost:8000 https://digikeralam.ksitm.kerala.gov.in;";

    # Frontend (React App)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API (Django)
    location /api/ {
        proxy_pass http://unix:/run/gunicorn.sock;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://unix:/run/gunicorn.sock;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static Files
    location /static/ {
        alias /var/www/digikeralam/static/;
        expires 30d;
        access_log off;
    }

    # Media Files
    location /media/ {
        alias /var/www/digikeralam/media/;
    }
}
