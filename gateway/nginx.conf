worker_processes 1;

events { worker_connections 1024; }

http {
    sendfile on;

    # upstream legacy_backend {
    #     server legacy_backend:8000;
    # }

    server {
        listen 80;

        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route /api/sessions to Session Service
        location /api/sessions/ {
            proxy_pass http://session_service:8000/api/sessions/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route /api/training to Session Service (Legacy)
        location /api/training/ {
            proxy_pass http://session_service:8000/api/training/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route /api/assignments to Session Service
        location /api/assignments/ {
            proxy_pass http://session_service:8000/api/assignments/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route /api/attendance to Attendance Service
        location /api/attendance/ {
            proxy_pass http://attendance_service:8000/api/attendance/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route /api/feedback to Attendance Service
        location /api/feedback/ {
            proxy_pass http://attendance_service:8000/api/feedback/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route /api/analytics to Analytics Service
        location /api/analytics/ {
            proxy_pass http://analytics_service:8000/api/analytics/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Redirect /api/users/trainers/ to Profile Service
        location /api/users/trainers/ {
            proxy_pass http://profile_service:8000/api/profiles/trainers/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Redirect /api/auth/profile/ to Profile Service (Me)
        location /api/auth/profile/ {
            proxy_pass http://profile_service:8000/api/profiles/me/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route /api/auth to Auth Service
        location /api/auth/ {
            proxy_pass http://auth_service:8000/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route /api/geography/ to Geo Service
        location /api/geography/ {
            proxy_pass http://geo_service:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route /api/locations/ to Geo Service
        location /api/locations/ {
            proxy_pass http://geo_service:8000; # Forward as-is (Geo Service must handle /api/locations if used, but we know it handles /api/geography)
            # Wait, if Geo Service only handles /api/geography, then forwarding /api/locations/ will fail 404 in Django!
            # So for /api/locations/, we MUST rewrite. 
            # But for /api/geography/, we can pass as-is.
        }

        # Route /api/profiles/ to Profile Service
        location /api/profiles/ {
            proxy_pass http://profile_service:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }


        
        # Route /admin to Legacy Backend
        # location /admin/ {
        #     proxy_pass http://legacy_backend/admin/;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        # }
        
        # Route /static to Legacy Backend
        # location /static/ {
        #     proxy_pass http://legacy_backend/static/;
        # }
    }
}
